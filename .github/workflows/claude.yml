name: Claude Code

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_target:
    types: [opened]

jobs:
  claude:
    uses: synadia-io/ai-workflows/.github/workflows/claude.yml@v1
    with:
      review_focus: |
        Additionally focus on:
        - Extension trait design consistency across crates (nats-extra, jetstream-extra, nats-counters)
        - Correct async patterns and tokio usage
        - Safety issues (unsafe code, panics, unwraps in non-test code)
    secrets:
      claude_oauth_token: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
